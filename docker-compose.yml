services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.routers.http-0-ampqu4s7lz8yjbx64s9t35l5.entryPoints=http"
      - "traefik.http.routers.http-0-ampqu4s7lz8yjbx64s9t35l5.middlewares=gzip"
      - "traefik.http.routers.http-0-ampqu4s7lz8yjbx64s9t35l5.rule=Host(`ampqu4s7lz8yjbx64s9t35l5.46.62.218.106.sslip.io`) && PathPrefix(`/`)"
      - "traefik.http.routers.http-0-ampqu4s7lz8yjbx64s9t35l5.service=http-0-ampqu4s7lz8yjbx64s9t35l5"
      - "traefik.http.services.http-0-ampqu4s7lz8yjbx64s9t35l5.loadbalancer.server.port=3000"
      - "caddy_0=http://ampqu4s7lz8yjbx64s9t35l5.46.62.218.106.sslip.io"
      - "caddy_0.handle_path=/*"
      - "caddy_0.handle_path.0_reverse_proxy={{upstreams 3000}}"
      - "caddy_0.encode=zstd gzip"
      - "caddy_0.header=-Server"
      - "caddy_ingress_network=coolify"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: ${REDIS_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    networks:
      - coolify

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      REDIS_URL: ${REDIS_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    networks:
      - coolify

networks:
  coolify:
    external: true
